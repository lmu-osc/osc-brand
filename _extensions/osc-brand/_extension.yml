title: osc-brand
author: Patrick Callahan
version: 1.0.0
url: https://github.com/lmu-osc/osc-brand
description: LMU Open Science Center brand assets and default HTML format
license: MIT
quarto-required: ">=1.9.0"
contributes:
  metadata:
    project:
      brand: brand.yml
  formats:
    html:
      theme:
        light: [flatly, brand, lmu-osc-custom.scss]
        dark: [darkly, brand, lmu-osc-custom.scss]
    html+tutorial:
      theme:
        light: [flatly, brand, lmu-osc-custom.scss]
        dark: [darkly, brand, lmu-osc-custom.scss]
      toc: true
      toc-title: " "
      code-tools: true
      code-overflow: wrap
      code-link: true
      logo: small
      smooth-scroll: true
      footnotes-hover: true
      repo-actions: [edit, source, true] # this does not seem to have an effect?
      grid:
        sidebar-width: 300px
      # include footer here?
